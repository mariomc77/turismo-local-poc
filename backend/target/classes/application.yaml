spring:
  application:
    name: backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/turismo_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

google:
  client-id: ${GOOGLE_CLIENT_ID:932991278703-ss4ve9l49a7f8l6aeu29fmmrhngi9dbl.apps.googleusercontent.com}

jwt:
  secret: ${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:5173}