sonar.projectKey=mariomc77_turismo-local-poc
sonar.organization=mario1098
sonar.projectName=turismo-local-poc
sonar.projectVersion=1.0
sonar.host.url=https://sonarcloud.io

sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/target/**,**/coverage/**,**/*.test.jsx,**/*.test.js,**/test/**
sonar.test.inclusions=backend/src/test/java/**/*.java,frontend/src/**/*.test.jsx,frontend/src/**/*.test.js

sonar.java.binaries=backend/target/classes
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.qualitygate.wait=true
sonar.sourceEncoding=UTF-8